<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="styles.css" rel="stylesheet">
    <title>anjie</title>
</head>
<body>
    <div class="page landing">
        <div class="landing-content">
            <div class="landing-avatar-wrap" id="avatar-wrap">
                <img src="assets/me.png" alt="Enamel pin of Anjie" class="landing-avatar" id="avatar-img">
                <div class="landing-avatar-shadow" id="avatar-shadow">
                    <img src="assets/me.png" alt="" aria-hidden="true">
                </div>
            </div>
            <h1 class="landing-title">hellooo, i'm anjie</h1>
            <p class="landing-subtitle">daniel also works! here's what i do —</p>

            <div class="role-list">
                <a href="cse.html" class="role-link">
                    <span class="role-link-icon">💻</span>
                    <span class="role-link-text">developer</span>
                    <span class="role-link-arrow">›</span>
                </a>
                <a href="mus.html" class="role-link">
                    <span class="role-link-icon">🎵</span>
                    <span class="role-link-text">singer-songwriter &amp; producer</span>
                    <span class="role-link-arrow">›</span>
                </a>
                <a href="bio.html" class="role-link">
                    <span class="role-link-icon">🧬</span>
                    <span class="role-link-text">neuroscience researcher</span>
                    <span class="role-link-arrow">›</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        // If navigating back from a subpage, slide in from the left
        if (window.location.search.indexOf('back=1') !== -1) {
            document.body.classList.add('slide-in-back');
            history.replaceState(null, '', window.location.pathname);
        }

        document.querySelectorAll('.role-link').forEach(function(link) {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                var href = this.getAttribute('href');
                document.body.classList.add('slide-out');
                setTimeout(function() {
                    window.location.href = href;
                }, 250);
            });
        });

        // Avatar float + lean toward cursor
        (function() {
            var wrap = document.getElementById('avatar-wrap');
            var img = document.getElementById('avatar-img');
            var shadow = document.getElementById('avatar-shadow');
            var hovering = false;
            var currentX = 0, currentY = 0;
            var targetX = 0, targetY = 0;
            var raf;

            var MAX_OFFSET = 8;
            var HOVER_SCALE = 1.1;
            var LERP = 0.12;

            function lerp(a, b, t) {
                return a + (b - a) * t;
            }

            function animate() {
                currentX = lerp(currentX, targetX, LERP);
                currentY = lerp(currentY, targetY, LERP);

                var scale = hovering ? HOVER_SCALE : 1;
                img.style.transform = 'translate(' + currentX + 'px, ' + currentY + 'px) scale(' + scale + ')';

                // Shadow shifts opposite to the pin and blurs more when hovering
                var shadowX = -currentX * 0.6;
                var shadowY = -currentY * 0.6 + (hovering ? 4 : 2);
                var shadowScale = hovering ? 1.02 : 1;
                shadow.style.transform = 'translate(' + shadowX + 'px, ' + shadowY + 'px) scale(' + shadowScale + ')';
                shadow.style.filter = '';
                shadow.querySelector('img').style.filter = 'brightness(0) opacity(' + (hovering ? 0.22 : 0.18) + ') blur(' + (hovering ? 6 : 4) + 'px)';

                if (hovering || Math.abs(currentX - targetX) > 0.1 || Math.abs(currentY - targetY) > 0.1) {
                    raf = requestAnimationFrame(animate);
                } else {
                    img.style.transform = '';
                    shadow.style.transform = 'translate(0px, 2px) scale(1)';
                    shadow.querySelector('img').style.filter = 'brightness(0) opacity(0.18) blur(4px)';
                    raf = null;
                }
            }

            function startLoop() {
                if (!raf) raf = requestAnimationFrame(animate);
            }

            document.addEventListener('mousemove', function(e) {
                if (!hovering) return;
                var rect = wrap.getBoundingClientRect();
                var cx = rect.left + rect.width / 2;
                var cy = rect.top + rect.height / 2;
                var dx = e.clientX - cx;
                var dy = e.clientY - cy;
                var dist = Math.sqrt(dx * dx + dy * dy);
                var maxDist = 300;
                var factor = Math.min(dist / maxDist, 1);

                targetX = (dx / (dist || 1)) * MAX_OFFSET * factor;
                targetY = (dy / (dist || 1)) * MAX_OFFSET * factor;
            });

            wrap.addEventListener('mouseenter', function() {
                hovering = true;
                startLoop();
            });

            wrap.addEventListener('mouseleave', function() {
                hovering = false;
                targetX = 0;
                targetY = 0;
                startLoop();
            });
        })();
    </script>
</body>
</html>
